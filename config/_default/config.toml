baseURL = "https://www.opengis.ch/"
title = "OPENGIS.ch"
author = "OPENGIS.ch"
copyright = "OPENGIS.ch"

timeZone = "Europe/Zurich"

[pagination]
  pagerSize = 12

# Multilingual
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false

theme = "qfield-theme-v3"

disableHugoGeneratorInject = true
enableRobotsTXT = true
#enableGitInfo = true
enableEmoji = true
#sectionPagesMenu = "main"
#googleAnalytics = "UA-1511XXXX-X"

[frontmatter]
  date = ["date", "publishDate", "lastmod"]
  lastmod = ["lastmod", ":fileModTime", ":default"]

[taxonomies]
  tag = "tags"
  category = "categories"
  series = 'series'
  author = "authors"

[sitemap]
  changefreq = "weekly"
  filename = "sitemap.xml"
  priority = 0.5

[permalinks]
  blog = "/:year/:month/:day/:slug/"
#  post = "/post/:title/"

[module]
  [module.hugoVersion]
    extended = true
    min = "0.99.1"
    max = ""
  [[module.mounts]]
    source = "assets"
    target = "assets"
  [[module.mounts]]
    source = "static"
    target = "static"

[mediaTypes]
  [mediaTypes."text/css"]
    suffixes = ["css"]
