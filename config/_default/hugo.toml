baseURL = "https://www.opengis.ch/"
title = "OPENGIS.ch"
author = "OPENGIS.ch"
copyright = "OPENGIS.ch"
timeZone = "Europe/Zurich"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false
theme = "qfield-theme-v3"
disableHugoGeneratorInject = true
enableRobotsTXT = true
enableEmoji = true

[pagination]
pagerSize = 12

[frontmatter]
date = ["date", "publishDate", "lastmod"]
lastmod = ["lastmod", ":fileModTime", ":default"]

[taxonomies]
tag = "tags"
category = "categories"
series = "series"
author = "authors"

[sitemap]
changefreq = "weekly"
filename = "sitemap.xml"
priority = 0.5

[permalinks]
blog = "/:year/:month/:day/:slug/"
pages = "/:contentbasename/"

[module]
[module.hugoVersion]
extended = true
min = "0.99.1"
max = ""

[[module.mounts]]
source = "assets"
target = "assets"

[[module.mounts]]
source = "static"
target = "static"

[mediaTypes."text/css"]
suffixes = ["css"]

[params]
description = "OPENGIS.ch - Open Source GIS services, products, and training."
images = ["images/opengis-logo.png", "images/site-feature-image.png"]
mainMenuLogo = "images/opengis-logo.png"
enableDarkMode = true
defaultTheme = "light"
themeColorLight = "#ffffff"
themeColorDark = "#05060b"
themeColor = "#fff"
alert = false
alertDismissable = true
alertText = "Introducing this new service! <a class=\"alert-link stretched-link\" href=\"https://salvus.site/\">Check out Total Security</a>"
footerAbout = true
footerAboutTitle = "About OPENGIS.ch"
footerAboutText = "We build open-source geospatial solutions and provide services, support, and training."

[params.options]
bootStrapJs = true
breadCrumb = true
listCategoryFilter = true
listTagFilter = true

[markup]
defaultMarkdownHandler = "goldmark"

[markup.goldmark]
[markup.goldmark.extensions]
definitionList = true
footnote = true
linkify = true
strikethrough = true
table = true
taskList = true
typographer = true

[markup.goldmark.parser]
autoHeadingID = true
wrapStandAloneImageWithinParagraph = false

[markup.goldmark.parser.attribute]
block = true
title = true

[markup.goldmark.renderer]
hardWraps = false
unsafe = true
xHTML = false

[markup.tableOfContents]
endLevel = 3
ordered = false
startLevel = 2

