en:
  about:
    paragraphs:
      - "We are Swiss-made <strong>full-stack GeoNinjas.</strong> We offer a <strong>personalised</strong> service around your geodata solutions needs and support contracts with SLAs. Our vast experience in <strong>open-source</strong> technologies combined with our <strong>agile</strong> and distributed nature will help you <strong>quickly</strong> implement your envisioned solution with a low TCO, <strong>no vendor lock-in</strong> and complete <strong>control</strong> over the developed software."
      - "At OPENGIS.ch we are completely dedicated to using and developing open-source tools for a wide variety of reasons. The most important one being that we are convinced that it is for the best for our customers because of the flexibility, scalability and the future-proof nature of open-source concepts. We offer installation support, <a href=\"training-consulting/index.html\">training</a>, consultancy, maintenance and tailor suited <a href=\"custom-development/index.html\">development</a> for your open geospatial stack. We speak English, German, French, Italian, Spanish, and Romansh."
      - "We look forward to working with you on your next project."
    cta_text: "Get in touch"
    cta_href: "#contact"
  newsletter:
    title: "Subscribe to our Newsletter"
    button_text: "Subscribe"
    button_href: "newsletter/index.html"
  contact:
    title: "Get in Touch"
    lead: "We look forward to working with you on your next project."
    office_label: "Visit us at an office"
    write_label: "Write us"
    vat_label: "VAT Number CHE-183.516.448 MWST"

de:
  about:
    paragraphs:
      - "Wir sind Schweizer Software Entwickler – aber noch mehr sind wir <strong>full-stack Geo-Ninjas</strong>! Wir planen und entwickeln <strong>personalisierte</strong> Open Source GIS Lösungen als Desktop- oder Mobilapplikationen. Elegante Lösungen finden wir übrigens auch für vielschichtige Aufgaben."
      - "Wie wir das machen? Mit jahrelanger <strong>Open-source</strong> Technologie-Erfahrung, QGIS und PostGIS Expertise, QField und QFieldCloud Entwicklerwissen und unserem eigenen, hohen <strong>Schweizer Anspruch</strong>. Persönlicher Service in sechs Sprachen und eine ausgezeichnete <strong>Projektunterstützung</strong> von A-Z gehören da natürlich dazu. Wir übernehmen nämlich gerne Verantwortung für das, was wir tun. Darauf geben wir Ihnen unser Ninja-Ehrenwort – oder einen <strong>Support Vertrag</strong> mit SLA."
    cta_text: "Kontaktiere uns"
    cta_href: "#contact"
  newsletter:
    title: "Abonniere unseren Newsletter"
    button_text: "Abonnieren"
    button_href: "newsletter/index.html"
  contact:
    title: "Kontaktiere uns"
    lead: "Wir freuen uns darauf, mit Ihnen an Ihrem nächsten Projekt zu arbeiten."
    office_label: "Besuchen Sie uns in einem Büro"
    write_label: "Schreiben Sie uns"
    vat_label: "MwSt Nummer CHE-183.516.448 MWST"

fr:
  about:
    paragraphs:
      - "Nous sommes des <strong>GeoNinjas à part entière</strong> et offrons un service <strong>personnalisé</strong> en fonction de vos besoins en matière de géodonnées. Notre vaste expérience dans les technologies <strong>open source</strong>, combinée à notre nature <strong>flexible</strong> et variée, vous aidera à mettre en œuvre <strong>rapidement</strong> la solution que vous envisagez, avec un faible coût de fonctionnement, <strong>sans blocage du fournisseur</strong> et avec un <strong>contrôle</strong> total sur le logiciel développé."
      - "Chez OPENGIS.ch, nous nous consacrons entièrement à l’utilisation et au développement d’outils open source pour des raisons très diverses. La plus importante est que nous sommes convaincus que c’est pour le bien de nos clients grâce à la souplesse, l’extensibilité et la pérennité des concepts open source. Nous proposons une assistance à l’installation, des <a href=\"conseil/index.html\">formations</a>, des conseils, une maintenance et un <a href=\"developpement/index.html\">développement</a> sur mesure pour votre système géospatial. Nous parlons l’anglais, l’allemand, le français, l’italien, l’espagnol et le romanche."
      - "Nous nous réjouissons de travailler avec vous sur votre prochain projet."
    cta_text: "Contactez-nous"
    cta_href: "#contact"
  newsletter:
    title: "Abonnez-vous à notre newsletter"
    button_text: "S'abonner"
    button_href: "newsletter/index.html"
  contact:
    title: "Nous contacter"
    lead: "Nous nous réjouissons de travailler avec vous sur votre prochain projet."
    office_label: "Rendez-nous visite dans un bureau"
    write_label: "Écrivez-nous"
    vat_label: "Numéro TVA CHE-183.516.448 MWST"

