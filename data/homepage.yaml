shared:
  features_heading: "What makes us special?"
  about_image: "https://opengis.ch/wp-content/uploads/2020/04/theteam_2.png"
  what_we_do_heading: "What do we do"
  what_we_do_subheading: "We are here to help you set up your spatial data infrastructure based on seamlessly integrated desktop, web and mobile components. We support your team in planning, developing, deploying and running your infrastructure."
  newsletter_image: "/wp-content/uploads/2019/04/beetruck_banner_1800x530@2x.jpg"
  geoninjas_heading: "Our GeoNinjas"
  geoninjas_lead: "##### Thanks to our senior geodata infrastructure experts, Consultants, QGIS core developers and the makers of the mobile data acquisition solution QField, OPENGIS.ch has all it takes to make your project a success."
  geoninjas_teams_heading: "Meet Our Teams"
  geoninjas_teams_caption: "Discover all our teams and their expertise."
  blog_heading: "Blog"
  blog_subheading: "Latest news and tech suggestions live from your favourite team"
  services:
    - href: "custom-development/"
      image: "https://opengis.ch/wp-content/uploads/2020/04/code-solid.png"
      alt:
        en: "Custom developments"
        de: "Individuelle Entwicklung"
        fr: "Développement sur mesure"
        it: "Sviluppo su misura"
      title:
        en: "Custom developments"
        de: "Individuelle Entwicklung"
        fr: "Développement sur mesure"
        it: "Sviluppo su misura"
      tagline:
        en: "QGIS | QField | PostGIS | Django | Docker"
        de: "QGIS | QField | PostGIS | Django | Docker"
        fr: "QGIS | QField | PostGIS | Django | Docker"
        it: "QGIS | QField | PostGIS | Django | Docker"
      body:
        en: "Are you planning a new geodata infrastructure? We can help you build and deploy your complete Geodata infrastructure or smaller parts of it depending on your needs."
        de: "Planen Sie eine neue Geodateninfrastruktur? Wir helfen Ihnen beim Aufbau und der Bereitstellung Ihrer gesamten Geodateninfrastruktur oder einzelner Komponenten - passend zu Ihren Anforderungen."
        fr: "Vous planifiez une nouvelle infrastructure de géodonnées ? Nous vous aidons à concevoir et déployer toute votre infrastructure géospatiale, ou seulement les composants dont vous avez besoin."
        it: "State pianificando una nuova infrastruttura di geodati? Vi aiutiamo a progettare e distribuire l'intera infrastruttura geospaziale oppure solo i componenti di cui avete bisogno."
    - href: "qgis-support/"
      image: "https://opengis.ch/wp-content/uploads/2020/04/maintenance.png"
      alt:
        en: "Support and maintenance"
        de: "Support und Wartung"
        fr: "Support et maintenance"
        it: "Supporto e manutenzione"
      title:
        en: "Support and maintenance"
        de: "Support und Wartung"
        fr: "Support et maintenance"
        it: "Supporto e manutenzione"
      tagline:
        en: "Support with SLA for your SDI"
        de: "Support mit SLA für Ihre GDI"
        fr: "Support avec SLA pour votre infrastructure géospatiale"
        it: "Supporto con SLA per la vostra infrastruttura geospaziale"
      body:
        en: "Developing and deploying a great open-source solution is only half of the work. We deeply care about you and your deployments and this is why we take support and maintenance extremely seriously."
        de: "Die Entwicklung und Bereitstellung einer starken Open-Source-Lösung ist nur die halbe Arbeit. Uns liegen Sie und Ihre Installationen am Herzen, deshalb nehmen wir Support und Wartung sehr ernst."
        fr: "Développer et déployer une excellente solution open source n'est que la moitié du travail. Nous prenons le support et la maintenance de vos déploiements très au sérieux."
        it: "Sviluppare e distribuire una grande soluzione open source è solo metà del lavoro. Abbiamo a cuore voi e le vostre implementazioni, per questo prendiamo assistenza e manutenzione molto sul serio."
    - href: "training-consulting/"
      image: "https://opengis.ch/wp-content/uploads/2020/04/consulting-3.png"
      alt:
        en: "Training and consulting"
        de: "Training und Beratung"
        fr: "Formation et conseil"
        it: "Formazione e consulenza"
      title:
        en: "Training and consulting"
        de: "Training und Beratung"
        fr: "Formation et conseil"
        it: "Formazione e consulenza"
      tagline:
        en: "We help you build your capacity"
        de: "Wir stärken Ihre Kompetenzen"
        fr: "Nous renforçons vos compétences"
        it: "Vi aiutiamo a rafforzare le vostre competenze"
      body:
        en: "Our experienced and multilingual team is always ready to help you plan and improve the next steps and build up your in-house knowledge."
        de: "Unser erfahrenes und mehrsprachiges Team hilft Ihnen bei der Planung und Verbesserung der nächsten Schritte und beim Aufbau von internem Know-how."
        fr: "Notre équipe expérimentée et multilingue est toujours prête à vous aider à planifier les prochaines étapes, améliorer vos processus et renforcer vos compétences internes."
        it: "Il nostro team esperto e multilingue è sempre pronto ad aiutarvi a pianificare i prossimi passi, migliorare i processi e sviluppare le competenze interne."
    - href: "qgis-support/"
      image: "https://opengis.ch/wp-content/uploads/2020/04/qgis_logo.resized.png"
      alt:
        en: "QGIS"
        de: "QGIS"
        fr: "QGIS"
        it: "QGIS"
      title:
        en: "QGIS"
        de: "QGIS"
        fr: "QGIS"
        it: "QGIS"
      tagline:
        en: "Core development | plugins | workflows"
        de: "Kernentwicklung | Plugins | Workflows"
        fr: "Développement du cœur | extensions | workflows"
        it: "Sviluppo core | plugin | workflow"
      body:
        en: "We are among the main core committers of QGIS and know it inside-out. We can help you optimizing your workflows, build you plugins or modify QGIS itself."
        de: "Wir gehören zu den wichtigsten Core-Committern von QGIS und kennen es in- und auswendig. Wir helfen Ihnen, Workflows zu optimieren, Plugins zu entwickeln oder QGIS selbst anzupassen."
        fr: "Nous faisons partie des principaux contributeurs au cœur de QGIS et le connaissons en profondeur. Nous pouvons optimiser vos workflows, développer des extensions ou adapter QGIS lui-même."
        it: "Siamo tra i principali contributori al core di QGIS e lo conosciamo a fondo. Possiamo aiutarvi a ottimizzare i workflow, sviluppare plugin o modificare QGIS stesso."
    - href: "https://qfield.cloud/"
      image: "/wp-content/uploads/2021/02/logo_notext_square.png"
      alt:
        en: "QFieldCloud"
        de: "QFieldCloud"
        fr: "QFieldCloud"
        it: "QFieldCloud"
      title:
        en: "QFieldCloud"
        de: "QFieldCloud"
        fr: "QFieldCloud"
        it: "QFieldCloud"
      tagline:
        en: "Seamless field work"
        de: "Nahtlose Feldarbeit"
        fr: "Travail de terrain fluide"
        it: "Lavoro sul campo senza interruzioni"
      body:
        en: "QFieldCloud's unique technology allows your team to focus on what's important, making sure you efficiently get the best possible field data to your office."
        de: "Die einzigartige Technologie von QFieldCloud ermöglicht es Ihrem Team, sich auf das Wesentliche zu konzentrieren und Felddaten effizient in bestmöglicher Qualität ins Büro zu bringen."
        fr: "La technologie unique de QFieldCloud permet à votre équipe de se concentrer sur l'essentiel et de transférer efficacement les meilleures données terrain vers le bureau."
        it: "La tecnologia unica di QFieldCloud consente al vostro team di concentrarsi sull'essenziale e trasferire in modo efficiente i migliori dati di campo in ufficio."
    - href: "https://qfield.org/"
      image: "https://opengis.ch/wp-content/uploads/2020/04/QField_Final_100-1.png"
      alt:
        en: "QField"
        de: "QField"
        fr: "QField"
        it: "QField"
      title:
        en: "QField"
        de: "QField"
        fr: "QField"
        it: "QField"
      tagline:
        en: "Mobile geodata collection app"
        de: "App für mobile Geodatenerfassung"
        fr: "Application mobile de collecte de géodonnées"
        it: "App mobile per la raccolta di geodati"
      body:
        en: "We are the creators of QField, the solution for field data collection and validation. We can help you get started or build you a custom app based on QField libraries."
        de: "Wir sind die Entwickler von QField, der Lösung für Erfassung und Validierung von Felddaten. Wir helfen Ihnen beim Einstieg oder entwickeln eine individuelle App auf Basis der QField-Bibliotheken."
        fr: "Nous sommes les créateurs de QField, la solution de collecte et de validation de données terrain. Nous pouvons vous aider à démarrer ou développer une application sur mesure basée sur les bibliothèques QField."
        it: "Siamo i creatori di QField, la soluzione per la raccolta e la validazione dei dati sul campo. Possiamo aiutarvi a partire rapidamente o sviluppare un'app personalizzata basata sulle librerie QField."
