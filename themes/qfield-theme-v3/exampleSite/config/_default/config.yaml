baseURL: https://filipecarneiro.github.io/hugo-bootstrap-theme/
title: Hugo Bootstrap Theme
author: Filipe Carneiro
copyright: 'Open-source <a class="text-muted text-decoration-none" href="https://github.com/filipecarneiro/hugo-bootstrap-theme/blob/main/LICENSE">MIT</a> Licensed.'

timeZone: Europe/London

defaultContentLanguage: en
defaultContentLanguageInSubdir: false

theme: hugo-bootstrap-theme
themesdir: ../..

disableHugoGeneratorInject: true
enableRobotsTXT: true
enableEmoji: true

frontmatter:
  date:
    - date
    - publishDate
    - lastmod
  lastmod:
    - lastmod
    - ':fileModTime'
    - ':default'

taxonomies:
  tag: tags
  category: categories
  series: series
  author: authors

sitemap:
  changefreq: weekly
  filename: sitemap.xml
  priority: 0.5

permalinks: {}

module:
  hugoVersion:
    extended: true
    min: '0.99.1'
    max: ''
  mounts:
    - source: assets
      target: assets
    - source: static
      target: static
