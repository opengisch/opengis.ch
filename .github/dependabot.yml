version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
      - "github-actions"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
      - "javascript"
    groups:
      root-build-tooling:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/themes/qfield-theme-v3"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
      - "javascript"
      - "theme"
    groups:
      theme-build-tooling:
        patterns:
          - "*"
